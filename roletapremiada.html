<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta de Prêmios</title>

<style>
body {
    margin: 0;
    padding: 20px 10px;
    background: #01240f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    overflow-x: hidden;
}

h1 {
    margin-top: 10px;
    margin-bottom: 20px;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
}

.roleta-container {
    position: relative;
    width: 90vw;
    height: 90vw;
    max-width: 500px;
    max-height: 500px;
}

#seta {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: clamp(15px, 4vw, 25px) solid transparent;
    border-right: clamp(15px, 4vw, 25px) solid transparent;
    border-top: clamp(30px, 8vw, 50px) solid gold;
    z-index: 10;
}

canvas {
    background: #111;
    border-radius: 50%;
    border: clamp(4px, 1.5vw, 8px) solid #444;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    width: 100%;
    height: 100%;
    display: block;
}

.btn-container {
    margin-top: 25px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 12px 30px;
    font-size: clamp(18px, 4vw, 22px);
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
    transition: transform 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    white-space: nowrap;
}

button:hover {
    transform: scale(1.05);
}

#resultado {
    margin-top: 20px;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: bold;
    color: gold;
    min-height: 35px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    text-align: center;
}

.confeti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    z-index: 999;
    pointer-events: none;
    animation: cair linear forwards;
}

@keyframes cair {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<h1>🎲✨ ROLETA PREMIADA ✨🎲</h1>

<div class="roleta-container">
    <div id="seta"></div>
    <canvas id="roleta"></canvas>
</div>

<div class="btn-container">
    <button id="girar">GIRAR ROLETA</button>
    <button id="resetar" style="display: none;">GIRAR NOVAMENTE</button>
</div>

<div id="resultado"></div>

<script>
// =========================================================================
// CONFIGURAÇÃO DE PRÊMIOS, CORES E PROBABILIDADES
// =========================================================================
const configPremios = [
    { nome: "VALE DRINK",    cor: "#006c18", peso: 9 },
    { nome: "DICA DO TESOURO",  cor: "#fbd400", peso: 15  },
    { nome: "CHOPE DE VINHO",         cor: "#d61c1c", peso: 12},
    { nome: "VALE SHOT",      cor: "#ffffff", peso: 19},
    { nome: "DICA DO TESOURO",          cor: "#006c18", peso: 19},
    { nome: "CHOPE PILSEN",     cor: "#fbd400", peso: 15},
    { nome: "BOLACHA M&D", cor: "#d61c1c", peso: 10}, 
    { nome: "VOUCHER R$ 150",   cor: "#ffffff", peso: 1  }  
];

const premios = configPremios.map(p => p.nome);

const canvas = document.getElementById("roleta");
const ctx = canvas.getContext("2d");

let largura, altura, centroX, centroY, raio;
let rAtualRad = 0; 
let girando = false;

const btnGirarReal = document.getElementById("girar");
const btnResetar = document.getElementById("resetar");
const divResultado = document.getElementById("resultado");

// Pré-carregamento da Logomarca Central
const logoImg = new Image();
logoImg.src = "logo.png"; 
logoImg.onload = () => {
    desenharRoleta(rAtualRad);
};

// =========================================================================
// RESPONSIVIDADE DINÂMICA DO CANVAS
// =========================================================================
function ajustarTamanhoCanvas() {
    const container = document.querySelector('.roleta-container');
    const tamanhoDinamico = container.clientWidth;

    canvas.width = tamanhoDinamico * 2;
    canvas.height = tamanhoDinamico * 2;

    largura = canvas.width;
    altura = canvas.height;
    centroX = largura / 2;
    centroY = altura / 2;
    raio = (largura / 2) - (largura * 0.02);

    desenharRoleta(rAtualRad);
}

window.addEventListener('resize', ajustarTamanhoCanvas);

// ================================
// DESENHAR ROLETA
// ================================
function desenharRoleta(rotacao = 0){
    const total = configPremios.length;
    const angulo = (Math.PI * 2) / total;

    ctx.clearRect(0,0,largura,altura);

    for(let i=0; i<total; i++){
        const inicio = i * angulo + rotacao;
        const fim = inicio + angulo;

        ctx.beginPath();
        ctx.moveTo(centroX, centroY);
        ctx.arc(centroX, centroY, raio, inicio, fim);
        ctx.fillStyle = configPremios[i].cor;
        ctx.fill();

        ctx.save();
        ctx.translate(centroX, centroY);
        ctx.rotate(inicio + angulo/2);

        ctx.fillStyle = (configPremios[i].cor === "#ffffff") ? "#111111" : "white";
        
        const tamanhoFonte = Math.floor(largura * 0.034);
        ctx.font = `bold ${tamanhoFonte}px Arial`;
        ctx.textAlign = "right";
        ctx.fillText(configPremios[i].nome, raio - (largura * 0.05), tamanhoFonte * 0.3);
        ctx.restore();
    }

    // Miolo Central com o Logo
    const raioMiolo = largura * 0.1; 
    ctx.save();
    ctx.beginPath();
    ctx.arc(centroX, centroY, raioMiolo, 0, Math.PI * 2);
    ctx.fillStyle = "#111111";
    ctx.fill();
    ctx.clip();

    if (logoImg.complete && logoImg.naturalWidth !== 0) {
        ctx.drawImage(logoImg, centroX - raioMiolo, centroY - raioMiolo, raioMiolo * 2, raioMiolo * 2);
    }
    ctx.restore();

    ctx.beginPath();
    ctx.arc(centroX, centroY, raioMiolo, 0, Math.PI * 2);
    ctx.strokeStyle = "gold";
    ctx.lineWidth = Math.max(2, largura * 0.006);
    ctx.stroke();
}

ajustarTamanhoCanvas();

// ================================
// SISTEMA DE CHUVA DE CONFETES
// ================================
function dispararChuvaConfeti() {
    const totalConfetes = 120;
    const coresConfeti = ['#ff595e', '#ff924c', '#ffca3a', '#8ac926', '#1982c4', '#f72585', '#ffffff'];

    for (let i = 0; i < totalConfetes; i++) {
        const confeti = document.createElement('div');
        confeti.classList.add('confeti');

        confeti.style.left = Math.random() * 100 + 'vw';
        confeti.style.backgroundColor = coresConfeti[Math.floor(Math.random() * coresConfeti.length)];
        confeti.style.width = Math.random() * 8 + 6 + 'px';
        confeti.style.height = Math.random() * 12 + 8 + 'px';
        
        const duracaoQueda = Math.random() * 2 + 2;
        confeti.style.animationDuration = duracaoQueda + 's';
        confeti.style.animationDelay = Math.random() * 0.5 + 's';

        document.body.appendChild(confeti);

        setTimeout(() => {
            confeti.remove();
        }, (duracaoQueda + 0.5) * 1000);
    }
}

// ====================================
// SORTEIO BASEADO EM PROBABILIDADE (PESO)
// ====================================
function sortearPremioPorPeso() {
    const pesoTotal = configPremios.reduce((soma, item) => soma + item.peso, 0);
    let numeroAleatorio = Math.random() * pesoTotal;
    
    for (let i = 0; i < configPremios.length; i++) {
        if (numeroAleatorio < configPremios[i].peso) {
            return i; 
        }
        numeroAleatorio -= configPremios[i].peso;
    }
    return 0;
}

// ================================
// AÇÃO: GIRAR ROLETA
// ================================
btnGirarReal.addEventListener("click", () => {
    if(girando) return;
    girando = true;
    
    divResultado.innerHTML = "";

    const premioEscolhidoIdx = sortearPremioPorPeso();
    const totalFatias = configPremios.length;
    const tamanhoFatiaRad = (Math.PI * 2) / totalFatias;

    // Alinhamento perfeito em 270 graus (topo da seta)
    const anguloAlvoFatia = (1.5 * Math.PI) - (premioEscolhidoIdx * tamanhoFatiaRad) - (tamanhoFatiaRad / 2);
    const anguloDestinoFinal = (anguloAlvoFatia % (Math.PI * 2) + (Math.PI * 2)) % (Math.PI * 2);
    
    // Aumentado proporcionalmente para manter a arrancada inicial super veloz
    const voltasEmRad = Math.PI * 2 * 40; 
    const fRotacaoFinalRad = anguloDestinoFinal + voltasEmRad;

    const inicioTempo = performance.now();
    
    // TEMPO REDUZIDO EM 30%: Mudado de 30s para 21s (21000ms)
    const duracao = 21000; 

    function animar(tempoAtual){
        const decorrido = tempoAtual - inicioTempo;
        const progresso = Math.min(decorrido / duracao, 1);

        // NOVA SOLUÇÃO DE FÍSICA: Cubic Ease Out Customizado
        // Garante perda de força orgânica perfeita. A velocidade zera exatamente junto com o tempo!
        const easeOut = 1 - Math.pow(1 - progresso, 3.5);

        rAtualRad = (fRotacaoFinalRad * easeOut);

        // Renderiza o movimento real puro baseado no tempo decorrido
        desenharRoleta(rAtualRad % (Math.PI * 2));

        if(progresso < 1){
            requestAnimationFrame(animar);
        } else {
            girando = false;
            
            // Grava a posição exata de parada de forma invisível para a próxima rodada começar do mesmo lugar
            rAtualRad = anguloDestinoFinal;
            desenharRoleta(rAtualRad);
            
            // Disparo instantâneo e síncrono
            divResultado.innerHTML = "🎉 Resultado: " + premios[premioEscolhidoIdx];
            dispararChuvaConfeti();

            btnGirarReal.style.display = "none";
            btnResetar.style.display = "inline-block";
        }
    }

    requestAnimationFrame(animar);
});

// ================================
// AÇÃO: LIBERAR NOVA RODADA (SENHA)
// ================================
btnResetar.addEventListener("click", () => {
    const senha = prompt("Digite a senha de administrador para liberar uma nova rodada:");
    
    if (senha === "123456") {
        divResultado.innerHTML = "";
        btnResetar.style.display = "none";
        btnGirarReal.style.display = "inline-block";
    } else {
        alert("Senha incorreta! Acesso negado.");
    }
});
</script>

</body>
</html>
